
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Color Palette Demo</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8fafc; color: #222; }
    .palette { margin: 2rem auto; max-width: 500px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px #0001; }
    .swatch { display: flex; }
    .color { flex: 1; height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; }
    .label { padding: 1rem; background: #fff; border-bottom: 1px solid #eee; font-size: 1.2rem; font-weight: bold; }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Professional Color Palette Demo</h2>
  <div class="palette">
    <div class="label">Navy & Gold</div>
    <div class="swatch">
      <div class="color" style="background:#1E293B; color:#fff;">#1E293B</div>
      <div class="color" style="background:#F59E42; color:#222;">#F59E42</div>
    </div>
  </div>
  <div class="palette">
    <div class="label">Charcoal & Emerald</div>
    <div class="swatch">
      <div class="color" style="background:#22223B; color:#fff;">#22223B</div>
      <div class="color" style="background:#10B981; color:#fff;">#10B981</div>
    </div>
  </div>
  <div class="palette">
    <div class="label">Deep Indigo & Light Gray</div>
    <div class="swatch">
      <div class="color" style="background:#3730A3; color:#fff;">#3730A3</div>
      <div class="color" style="background:#F3F4F6; color:#222;">#F3F4F6</div>
    </div>
  </div>
  <div class="palette">
    <div class="label">Classic Black & Gold</div>
    <div class="swatch">
      <div class="color" style="background:#111827; color:#fff;">#111827</div>
      <div class="color" style="background:#FFD700; color:#222;">#FFD700</div>
    </div>
  </div>
</body>
</html>
